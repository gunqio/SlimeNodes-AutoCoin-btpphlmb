name: SlimeNodes Auto Coin

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  earn-coins:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 当前仓库
        uses: actions/checkout@v4

      - name: 私仓
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          ref: main
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          path: private-repo

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run auto coin
        env:
          SLIME_SESSION: ${{ secrets.SLIME_SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python private-repo/slimenodes.py
