name: SlimeNodes Auto Coin

on:
  schedule:
- cron: '30 16 * * *'   # 北京时间 00:30
- cron: '30 4 * * *'    # 北京时间 12:30
  workflow_dispatch:

jobs:
  earn-coins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run auto coin
        env:
          SLIME_SESSION: ${{ secrets.SLIME_SESSION }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python slimenodes.py
